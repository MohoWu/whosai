services:
  - type: web
    name: whosai
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: >-
      uv sync --frozen --no-dev &&
      npm --prefix frontend ci &&
      npm --prefix frontend run build
    startCommand: >-
      .venv/bin/uvicorn whosai.main:app
      --app-dir src
      --host 0.0.0.0
      --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_HIDE_INPUTS
        value: "false"
      - key: LANGSMITH_HIDE_OUTPUTS
        value: "false"
      - key: WHOSAI_E2E
        value: "0"
      - key: LANGSMITH_PROJECT
        value: whosai-dev
